seed: 271

data:
  utkface_root: "/Users/taota/Documents/Uni/Master/Statistical learning /Project/ece271b-age-occlusion/try_dataset/UTKFace"
  split:
    train: 0.70
    val: 0.15

labels:
  # 7 bins:
  # 0–9, 10–19, 20–29, 30–39, 40–49, 50–59, 60+
  # We encode 60+ as [60, 200) so everything >=60 goes to last class.
  bins: [0, 10, 20, 30, 40, 50, 60, 200]

  # Optional (recommended): enforce a range so weird ages don't get silently mapped.
  min_age: 0
  max_age: 120

occlusion:
  types: ["none", "eyes", "mouth", "center"]
  fill: "mean"

pca:
  components: 100

gaussian:
  reg: 0.001

cnn:
  backbone: "resnet18"
  pretrained: true
  epochs: 10
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.0001

mlp:
  epochs: 20
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0001